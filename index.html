<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wix Headless · Google Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="hero">
      <p class="eyebrow">Wix Headless · GitHub Pages</p>
      <h1>Member Login</h1>
      <p class="subtitle">
        Member sign-in on a static site via the Wix-managed login flow
        (OAuth 2.0 + PKCE) with <code>getAuthUrl(oAuthData, { idp })</code>.
      </p>
      <div class="auth-box">
        <span id="auth-greeting" hidden></span>
        <div id="auth-buttons">
          <button data-idp="google" type="button" disabled>Sign in with Google</button>
          <button data-idp="facebook" type="button" disabled>Sign in with Facebook</button>
          <button data-idp="sso" type="button" disabled>Sign in with SSO</button>
        </div>
        <button id="auth-signout" type="button" hidden>Sign out</button>
      </div>
    </main>

    <footer>
      <p>
        Built with <a href="https://dev.wix.com/docs/go-headless" target="_blank" rel="noreferrer">Wix Headless</a>
        · Deployed on GitHub Pages
      </p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
